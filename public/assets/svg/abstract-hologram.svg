<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="holoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#049CD8" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#049CD8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#049CD8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Outer Glow Ellipse -->
  <ellipse cx="64" cy="64" rx="55" ry="25" fill="url(#holoGlow)"/>
  
  <!-- Concentric Projection Rings -->
  <ellipse cx="64" cy="64" rx="45" ry="18" fill="none" stroke="#049CD8" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.7"/>
  <ellipse cx="64" cy="64" rx="35" ry="13" fill="none" stroke="#FDD026" stroke-width="1" stroke-dasharray="4 2" opacity="0.8"/>
  <ellipse cx="64" cy="64" rx="20" ry="7" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.9"/>
  
  <!-- Hologram Projection Beams -->
  <path d="M64 64 L34 10 L94 10 Z" fill="url(#holoGlow)" opacity="0.2"/>
  <path d="M64 64 L54 0 L74 0 Z" fill="url(#holoGlow)" opacity="0.3"/>

  <!-- Tech crosshairs/particles -->
  <line x1="64" y1="44" x2="64" y2="84" stroke="#049CD8" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="64" x2="84" y2="64" stroke="#049CD8" stroke-width="1" opacity="0.5"/>
  <circle cx="64" cy="44" r="2" fill="#FFFFFF"/>
  <circle cx="44" cy="64" r="2" fill="#FDD026"/>
  <circle cx="84" cy="64" r="2" fill="#10B981"/>
</svg>
