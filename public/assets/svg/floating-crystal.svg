<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" width="32" height="48">
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#049CD8" />
      <stop offset="100%" stop-color="#1E3B8A" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow -->
  <polygon points="16,2 30,24 16,46 2,24" fill="#049CD8" opacity="0.3" filter="url(#neonGlow)"/>

  <!-- Crystal Body -->
  <polygon points="16,4 28,24 16,44 4,24" fill="url(#crystalGrad)" stroke="#049CD8" stroke-width="1.5"/>
  
  <!-- Crystal Facets -->
  <polygon points="16,4 16,44 28,24" fill="#FFFFFF" opacity="0.15"/>
  <line x1="16" y1="4" x2="16" y2="44" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="4" y1="24" x2="28" y2="24" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>
</svg>
