<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128" shape-rendering="crispEdges">
  <!-- Sky glow around island -->
  <ellipse cx="128" cy="64" rx="100" ry="40" fill="url(#blueGlow)" opacity="0.3"/>
  <defs>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#049CD8"/>
      <stop offset="100%" stop-color="#049CD8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Grass Layer top (Green neon) -->
  <path d="M32 32h192v8H32z" fill="#10B981"/>
  <path d="M48 40h160v4H48z" fill="#059669"/>
  <path d="M36 40h4v4h-4zm20 0h4v8h-4zm32 0h4v4h-4zm50 0h4v8h-4zm40 0h4v4h-4z" fill="#10B981"/>

  <!-- Dirt core layers (Dark blue tech bricks) -->
  <path d="M48 44h160v12H48z" fill="#1E293B"/>
  <path d="M64 56h128v12H64z" fill="#0F172A"/>
  <path d="M80 68h96v12H80z" fill="#090D16"/>
  <path d="M96 80h64v12H96z" fill="#049CD8" opacity="0.4"/>
  <path d="M112 92h32v8h-32z" fill="#049CD8" opacity="0.8"/>

  <!-- Gold ores (Pixel blocks inside the dirt) -->
  <rect x="72" y="48" width="8" height="8" fill="#FDD026"/>
  <rect x="160" y="52" width="6" height="6" fill="#FDD026"/>
  <rect x="110" y="60" width="8" height="8" fill="#049CD8"/>
  <rect x="140" y="72" width="8" height="8" fill="#FDD026"/>

  <!-- Floating particles below -->
  <rect x="100" y="108" width="4" height="4" fill="#049CD8"/>
  <rect x="150" y="104" width="3" height="3" fill="#FDD026"/>
  <rect x="70" y="96" width="4" height="4" fill="#10B981"/>
  <rect x="180" y="92" width="5" height="5" fill="#049CD8"/>
</svg>
